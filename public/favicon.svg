<svg viewBox="-16 -16 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <style>
    .stroke { stroke: #2a2a2a; fill: none; }
    .fill { fill: #2a2a2a; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #e0e0e0; }
      .fill { fill: #e0e0e0; }
    }
  </style>
  <g class="stroke" stroke-width="1.5">
    <!-- Center point -->
    <circle cx="0" cy="0" r="2.5" class="fill" />
    
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="7" stroke-opacity="0.8" />
    <circle cx="0" cy="0" r="13" stroke-opacity="0.5" />
    
    <!-- Crosshairs -->
    <line x1="-15" y1="0" x2="15" y2="0" stroke-opacity="0.6" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke-opacity="0.6" />
    
    <!-- Engraved diagonal tick marks -->
    <line x1="-4" y1="-4" x2="-6" y2="-6" stroke-width="1" stroke-opacity="0.8" />
    <line x1="4" y1="4" x2="6" y2="6" stroke-width="1" stroke-opacity="0.8" />
    <line x1="-4" y1="4" x2="-6" y2="6" stroke-width="1" stroke-opacity="0.8" />
    <line x1="4" y1="-4" x2="6" y2="-6" stroke-width="1" stroke-opacity="0.8" />
  </g>
</svg>